<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FF4D20;
  --ink: #111010; --ink2: #6B6560; --ink3: #B8B0A8;
  --border: #F0EDE8; --white: #FFFFFF; --pale: #FFF5EE;
}
html, body {
  height: 100%; background: #0E0E0E;
  color: white; font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

/* TOP BAR */
.top {
  position: sticky; top: 0; z-index: 100;
  background: #0a0a0a; border-bottom: 1px solid #1f1f1f;
  padding: 14px 16px 10px;
}
.top-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-style: italic;
  font-size: 20px; color: var(--orange);
  letter-spacing: 0.02em; margin-bottom: 3px;
}
.top-sub {
  font-size: 10px; color: var(--ink3);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}
.toggle {
  display: flex; gap: 5px;
  background: #1a1a1a; padding: 4px; border-radius: 12px;
}
.tbtn {
  flex: 1; padding: 9px 6px; border: none;
  border-radius: 9px; font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.04em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
}
.tbtn.on { background: var(--orange); color: white; }
.tbtn:not(.on) { background: transparent; color: var(--ink3); }

/* LISTA */
.lista { padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 10px; }

/* CARD SPLASH */
.cs {
  border-radius: 18px; overflow: hidden;
  cursor: pointer; transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.cs:active { transform: scale(0.975); }

.cs-inner {
  padding: 26px 22px 22px;
  position: relative; overflow: hidden;
  min-height: 210px; display: flex; flex-direction: column;
  justify-content: space-between;
}
.cs-inner::before {
  content: ''; position: absolute;
  width: 240px; height: 240px; border-radius: 50%;
  top: -70px; right: -70px;
  background: rgba(255,255,255,0.05); pointer-events: none;
}
.cs-inner::after {
  content: ''; position: absolute;
  width: 150px; height: 150px; border-radius: 50%;
  bottom: -50px; left: -30px;
  background: rgba(255,255,255,0.03); pointer-events: none;
}
.cs-top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 2; }
.cs-num {
  width: 24px; height: 24px;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  border-radius: 50%; font-size: 10px; font-weight: 800; color: white;
  display: flex; align-items: center; justify-content: center;
}
.cs-tag {
  font-size: 9px; padding: 4px 9px; border-radius: 50px;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.85); font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.cs-logo { position: relative; z-index: 2; line-height: 1; display: block; margin: 12px 0 16px; }
.cs-preview { position: relative; z-index: 2; }
.cs-h { font-size: 16px; line-height: 1.2; margin-bottom: 3px; opacity: 0.85; }
.cs-s { font-size: 11px; opacity: 0.5; line-height: 1.4; }

/* CARD LOGIN */
.cl {
  border-radius: 18px; overflow: hidden; background: white;
  cursor: pointer; transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.cl:active { transform: scale(0.975); }
.cl-inner { padding: 18px 20px 18px; display: flex; flex-direction: column; gap: 12px; }
.cl-meta {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.cl-num {
  width: 22px; height: 22px; background: var(--orange); color: white;
  border-radius: 50%; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.cl-fname { font-family: monospace; font-size: 10px; color: var(--ink3); flex: 1; letter-spacing: 0.03em; }
.cl-tag {
  font-size: 9px; padding: 3px 8px; border-radius: 50px;
  background: var(--pale); color: var(--orange);
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.cl-logo { line-height: 1; display: block; }
.cl-div { height: 1px; background: var(--border); }
.cl-h { font-size: 19px; color: var(--ink); line-height: 1.2; }
.cl-s { font-size: 13px; color: var(--ink2); line-height: 1.5; margin-top: -4px; }
.cl-btn {
  width: 100%; padding: 13px; border-radius: 14px;
  background: var(--orange); color: white; border: none;
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: default;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
