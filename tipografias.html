<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF4D20;
  --ink:    #111010;
  --ink2:   #6B6560;
  --ink3:   #B8B0A8;
  --border: #F0EDE8;
  --white:  #FFFFFF;
  --pale:   #FFF5EE;
}

body {
  background: #1a1a1a;
  color: white;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
}

/* HEADER FIXO */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #111;
  border-bottom: 1px solid #333;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.top-title {
  font-family: 'Exo 2', sans-serif;
  font-weight: 900;
  font-style: italic;
  font-size: 20px;
  color: var(--orange);
  letter-spacing: -0.02em;
}

.top-sub {
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* TOGGLE MODO */
.toggle-row {
  display: flex;
  gap: 8px;
}

.toggle-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.toggle-btn.ativo {
  background: var(--orange);
  color: white;
}

.toggle-btn:not(.ativo) {
  background: #2a2a2a;
  color: var(--ink3);
}

/* LISTA */
.lista {
  padding: 16px 14px 80px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* CARD DE TIPOGRAFIA */
.tcard {
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.tcard:active { transform: scale(0.98); }

/* MODO SPLASH â€” fundo colorido */
.tcard-splash {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
  position: relative;
  overflow: hidden;
  min-height: 160px;
  justify-content: center;
}

.tcard-splash::before {
  content: '';
  position: absolute;
  width: 250px; height: 250px;
  border-radius: 50%;
  top: -80px; right: -80px;
  opacity: 0.08;
  background: white;
}

/* MODO LOGIN â€” fundo branco */
.tcard-login {
  padding: 24px 20px;
  background: var(--white);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* META INFO */
.tcard-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
}

.tcard-meta-login {
  background: #f5f5f5;
}

.meta-num {
  width: 20px; height: 20px;
  background: var(--orange); color: white;
  border-radius: 50%; font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.meta-name {
  font-family: monospace; font-size: 10px;
  color: rgba(255,255,255,0.7); flex: 1;
}

.meta-name-login {
  color: var(--ink3);
}

.meta-vibe {
  font-size: 9px; padding: 2px 8px;
  border-radius: 50px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  background: rgba(255,255,255,0.15);
  color: white;
}

.meta-vibe-login {
  background: var(--pale);
  color: var(--orange);
}

/* LOGO GRANDE */
.logo-display {
  position: relative;
  z-index: 2;
  line-height: 1;
  display: block;
}

/* UI PREVIEW MINI */
.ui-preview {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; gap: 6px;
}

.ui-headline {
  font-size: 16px;
  line-height: 1.2;
  opacity: 0.9;
}

.ui-sub {
  font-size: 12px;
  opacity: 0.6;
  line-height: 1.4;
}

/* Login version */
.ui-headline-login { color: var(--ink); }
.ui-sub-login { color: var(--ink2); }

.btn-preview {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: default;
  width: fit-content;
}

.btn-splash {
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(8px);
}

.btn-login-orange {
  background: var(--orange);
  color: white;
}

/* ANIMACIONES */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tcard { animation: fadeIn 0.4s ease both; }
.tcard:nth-child(1)  { animation-delay: 0.02s; }
.tcard:nth-child(2)  { animation-delay: 0.04s; }
.tcard:nth-child(3)  { animation-delay: 0.06s; }
.tcard:nth-child(4)  { animation-delay: 0.08s; }
.tcard:nth-child(5)  { animation-delay: 0.10s; }
.tcard:nth-child(6)  { animation-delay: 0.12s; }
.tcard:nth-child(7)  { animation-delay: 0.14s; }
.tcard:nth-child(8)  { animation-delay: 0.16s; }
.tcard:nth-child(9)  { animation-delay: 0.18s; }
.tcard:nth-child(10) { animation-delay: 0.20s; }
.tcard:nth-child(11) { animation-delay: 0.22s; }
.tcard:nth-child(12) { animation-delay: 0.24s; }
.tcard:nth-child(13) { animation-delay: 0.26s; }
.tcard:nth-child(14) { animation-delay: 0.28s; }
.tcard:nth-child(15) { animation-delay: 0.30s; }
</style>
</head>
