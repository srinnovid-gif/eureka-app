<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>eureka! — Tipografias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,800;1,900&family=Barlow+Semi+Condensed:ital,wght@0,800;0,900;1,800;1,900&family=Barlow:ital,wght@0,900;1,900&family=Oswald:wght@600;700&family=Saira:ital,wght@0,900;1,900&family=Saira+Condensed:wght@800;900&family=Saira+Semi+Condensed:ital,wght@0,800;0,900;1,800;1,900&family=Jost:ital,wght@0,900;1,900&family=Heebo:wght@900&family=Prompt:ital,wght@0,900;1,900&family=Kanit:ital,wght@0,800;0,900;1,800;1,900&family=Rajdhani:wght@600;700&family=Arimo:ital,wght@0,700;1,700&family=Krona+One&family=Schibsted+Grotesk:ital,wght@0,900;1,900&family=Nunito:wght@900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF4D20;
  --ink:    #111010;
  --ink2:   #6B6560;
  --ink3:   #B8B0A8;
  --border: #F0EDE8;
  --white:  #FFFFFF;
  --pale:   #FFF5EE;
}

html, body {
  height: 100%;
  background: #111;
  color: white;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #0a0a0a;
  border-bottom: 1px solid #222;
  padding: 14px 16px 10px;
}

.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-style: italic;
  font-size: 22px;
  color: var(--orange);
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}

.topbar-sub {
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Toggle */
.toggle {
  display: flex;
  gap: 6px;
  background: #1a1a1a;
  padding: 4px;
  border-radius: 12px;
}

.toggle-btn {
  flex: 1;
  padding: 9px 8px;
  border: none;
  border-radius: 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.toggle-btn.on {
  background: var(--orange);
  color: white;
}

.toggle-btn:not(.on) {
  background: transparent;
  color: var(--ink3);
}

/* ── LISTA ── */
.lista {
  padding: 14px 12px 80px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── CARD SPLASH ── */
.card-splash {
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.card-splash:active { transform: scale(0.975); }

.splash-inner {
  padding: 28px 22px 22px;
  position: relative;
  overflow: hidden;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Círculo decorativo */
.splash-inner::before {
  content: '';
  position: absolute;
  width: 220px; height: 220px;
  border-radius: 50%;
  top: -60px; right: -60px;
  background: rgba(255,255,255,0.06);
  pointer-events: none;
}

.splash-inner::after {
  content: '';
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  bottom: -40px; left: -30px;
  background: rgba(255,255,255,0.04);
  pointer-events: none;
}

.splash-logo {
  position: relative;
  z-index: 2;
  line-height: 1;
  display: block;
}

.splash-preview {
  position: relative;
  z-index: 2;
  margin-top: 16px;
}

.splash-headline {
  font-size: 17px;
  line-height: 1.2;
  opacity: 0.85;
  margin-bottom: 5px;
}

.splash-sub {
  font-size: 12px;
  opacity: 0.55;
  line-height: 1.4;
}

.splash-meta {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.meta-num {
  width: 22px; height: 22px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  font-size: 10px; font-weight: 800;
  color: white;
  display: flex; align-items: center; justify-content: center;
}

.meta-tag {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 50px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 700;
}

/* ── CARD LOGIN ── */
.card-login {
  border-radius: 18px;
  overflow: hidden;
  background: white;
  cursor: pointer;
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.card-login:active { transform: scale(0.975); }

.login-inner {
  padding: 22px 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.login-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.login-num {
  width: 22px; height: 22px;
  background: var(--orange); color: white;
  border-radius: 50%; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}

.login-fname {
  font-family: monospace; font-size: 10px;
  color: var(--ink3); flex: 1; letter-spacing: 0.03em;
}

.login-tag {
  font-size: 9px; padding: 3px 8px;
  border-radius: 50px; font-weight: 700;
  background: var(--pale); color: var(--orange);
  letter-spacing: 0.05em; text-transform: uppercase;
}

.login-logo {
  line-height: 1;
  display: block;
}

.login-divider { height: 1px; background: var(--border); }

.login-headline {
  font-size: 20px;
  color: var(--ink);
  line-height: 1.2;
  font-weight: 800;
}

.login-sub {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.5;
  margin-top: -6px;
}

.login-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
  background: var(--orange);
  color: white;
  border: none;
  cursor: default;
  width: 100%;
  justify-content: center;
}

/* ── ANIMACIÓN ── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">eureka! · Tipografias</div>
  <div class="topbar-sub">Semi-quadradas · Dinâmicas · 12 opções</div>
  <div class="toggle">
    <button class="toggle-btn on" id="btn-s" onclick="modo('splash')">🌟 Splash</button>
    <button class="toggle-btn" id="btn-l" onclick="modo('login')">📱 Login</button>
  </div>
</div>

<div class="lista" id="lista"></div>

<script>
// ─── FUENTES SEMI-CUADRADAS, DINÁMICAS ───────────────────────
// Criterios de selección:
// ✓ Terminaciones semi-cuadradas (no redondas, no afiladas)
// ✓ Carácter dinámico (tensión visual, peso, condensación)
// ✓ "eureka!" en minúscula
// ✓ Memorables — cada una con identidad propia

const FONTES = [

  // ── GROTESCAS CONDENSADAS CON TENSIÓN ──

  {
    n: 1,
    nome: "Barlow Condensed 900i",
    tag: "Esportiva condensada",
    css: `font-family:'Barlow Condensed',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:0.01em;`,
    sz: "82px",
    bg: "linear-gradient(145deg, #FF4D20 0%, #FF2D00 100%)",
    cor: "white",
    lcor: "var(--orange)",
    // Por qué: Grotesca condensada californiana. Las terminaciones
    // son levemente cuadradas. La itálica crea movimiento sin curvas.
    // Es la "Nike" de las fuentes — deportiva, directa, sin excusas.
    desc: "Barlow: grotesca de California. Semi-cuadrada, itálica cria movimento diagonal. Energética sem ser caricata."
  },

  {
    n: 2,
    nome: "Barlow Semi Condensed 900i",
    tag: "Equilibrio dinámico",
    css: `font-family:'Barlow Semi Condensed',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.01em;`,
    sz: "70px",
    bg: "linear-gradient(145deg, #1a1a2e 0%, #16213e 100%)",
    cor: "var(--orange)",
    lcor: "var(--orange)",
    desc: "Versão mais larga da Barlow. Pontas semi-quadradas, mais legível em tamanhos menores. Ótima no login."
  },

  {
    n: 3,
    nome: "Saira 900 Italic",
    tag: "Tecnológica humana",
    css: `font-family:'Saira',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.02em;`,
    sz: "68px",
    bg: "linear-gradient(145deg, #0F3460 0%, #16213E 100%)",
    cor: "white",
    lcor: "#0F3460",
    desc: "Saira: desenhada para interfaces digitais no Brasil. Terminações semi-quadradas, traços com tensão. Itálica = dinamismo."
  },

  {
    n: 4,
    nome: "Saira Semi Condensed 900i",
    tag: "Estruturada moderna",
    css: `font-family:'Saira Semi Condensed',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.01em;`,
    sz: "74px",
    bg: "linear-gradient(145deg, #1B4332 0%, #2D6A4F 100%)",
    cor: "white",
    lcor: "#1B4332",
    desc: "Semi-condensada com estrutura robusta. Pontas quadradas visíveis nas letras 'e', 'u', 'k'. Sobre verde parece marca de impacto social."
  },

  {
    n: 5,
    nome: "Jost 900 Italic",
    tag: "Geométrica precisa",
    css: `font-family:'Jost',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.03em;`,
    sz: "72px",
    bg: "linear-gradient(145deg, #2D0057 0%, #4A0E8F 100%)",
    cor: "white",
    lcor: "#4A0E8F",
    desc: "Jost: geométrica européia. Terminações quase quadradas, muito tensão nos strokes. Itálica cria inclinação única no 'e' e 'a'."
  },

  {
    n: 6,
    nome: "Heebo 900",
    tag: "Grotesca quadrada",
    css: `font-family:'Heebo',sans-serif;
          font-weight:900;
          letter-spacing:-0.04em;`,
    sz: "72px",
    bg: "linear-gradient(145deg, #212121 0%, #424242 100%)",
    cor: "var(--orange)",
    lcor: "#212121",
    desc: "Heebo: baseada no alfabeto hebraico. Terminações notavelmente quadradas. O 'e' e 'k' são únicos. Sem itálica — a tensão vem do peso e do espaçamento."
  },

  {
    n: 7,
    nome: "Prompt 900 Italic",
    tag: "Tailandesa moderna",
    css: `font-family:'Prompt',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.02em;`,
    sz: "68px",
    bg: "linear-gradient(145deg, #7B2D00 0%, #BF360C 100%)",
    cor: "white",
    lcor: "#BF360C",
    desc: "Prompt: tailandesa com DNA de grotesca europeia. Pontas semi-quadradas com leve corte diagonal. Itálica muito elegante — o '!' fica fenomenal."
  },

  {
    n: 8,
    nome: "Kanit 900 Italic",
    tag: "Asiática tensa",
    css: `font-family:'Kanit',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.02em;`,
    sz: "68px",
    bg: "linear-gradient(145deg, #004D40 0%, #00695C 100%)",
    cor: "white",
    lcor: "#00695C",
    desc: "Kanit: tailandesa mais geométrica. Traços com cortes limpos — semi-quadrada pura. Itálica cria angulação agressiva no 'k' e 'a'. Muito usada em fintech asiático."
  },

  {
    n: 9,
    nome: "Oswald 700",
    tag: "Condensada clássica",
    css: `font-family:'Oswald',sans-serif;
          font-weight:700;
          letter-spacing:0.02em;`,
    sz: "72px",
    bg: "linear-gradient(145deg, #880E4F 0%, #AD1457 100%)",
    cor: "white",
    lcor: "#880E4F",
    desc: "Oswald: releitura da Alternate Gothic. Terminações flat (horizontais) — o máximo do semi-quadrado. Condensada e vertical. Sem itálica — a força vem da proporção."
  },

  {
    n: 10,
    nome: "Rajdhani 700",
    tag: "Indiana geométrica",
    css: `font-family:'Rajdhani',sans-serif;
          font-weight:700;
          letter-spacing:0.02em;`,
    sz: "68px",
    bg: "linear-gradient(145deg, #1A237E 0%, #283593 100%)",
    cor: "white",
    lcor: "#1A237E",
    desc: "Rajdhani: devanagari + grotesca. Terminações com cortes retos únicos — semi-quadrada com personalidade. O 'e' tem uma abertura que não existe em nenhuma outra fonte."
  },

  {
    n: 11,
    nome: "Schibsted Grotesk 900i",
    tag: "Editorial nórdica",
    css: `font-family:'Schibsted Grotesk',sans-serif;
          font-weight:900; font-style:italic;
          letter-spacing:-0.04em;`,
    sz: "68px",
    bg: "linear-gradient(145deg, #0D1117 0%, #1C2128 100%)",
    cor: "var(--orange)",
    lcor: "#0D1117",
    desc: "Schibsted: criada para plataformas de mídia nórdicas. Grotesca com terminações semi-quadradas e aberturas humanistas. A itálica 900 é raramente usada — completamente única."
  },

  {
    n: 12,
    nome: "Krona One",
    tag: "Grotesca pesada única",
    css: `font-family:'Krona One',sans-serif;
          letter-spacing:-0.01em;`,
    sz: "62px",
    bg: "linear-gradient(145deg, #FF6F00 0%, #F57C00 100%)",
    cor: "white",
    lcor: "#E65100",
    desc: "Krona: semi-condensada com traços pesados e terminações quase quadradas. Proporções únicas — o 'k' tem uma estrutura que vai ficar na memória. Sem itálica mas com muita personalidade."
  },

];

// ─── RENDER ──────────────────────────────────────────────────

let modoAtual = 'splash';

function modo(m) {
  modoAtual = m;
  document.getElementById('btn-s').className = 'toggle-btn' + (m === 'splash' ? ' on' : '');
  document.getElementById('btn-l').className = 'toggle-btn' + (m === 'login'  ? ' on' : '');
  render();
}

function render() {
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  FONTES.forEach((f, i) => {
    const el = document.createElement('div');
    el.style.animation = `cardIn 0.35s ${i * 0.04}s ease both`;
    el.style.cssText += 'opacity:0';

    if (modoAtual === 'splash') {
      el.className = 'card-splash';
      el.innerHTML = `
        <div class="splash-inner" style="background:${f.bg}">
          <div class="splash-meta">
            <div class="meta-num">${f.n}</div>
            <div class="meta-tag">${f.tag}</div>
          </div>
          <div class="splash-logo" style="${f.css}font-size:${f.sz};color:${f.cor};">eureka!</div>
          <div class="splash-preview">
            <div class="splash-headline" style="${f.css}font-size:18px;color:${f.cor};">
              Seu trabalho está aqui
            </div>
            <div class="splash-sub">${f.desc}</div>
          </div>
        </div>
      `;
    } else {
      el.className = 'card-login';
      const szLogin = parseInt(f.sz) * 0.65 + 'px';
      el.innerHTML = `
        <div class="login-inner">
          <div class="login-meta">
            <div class="login-num">${f.n}</div>
            <span class="login-fname">${f.nome}</span>
            <span class="login-tag">${f.tag}</span>
          </div>
          <div class="login-logo" style="${f.css}font-size:${szLogin};color:${f.lcor};">eureka!</div>
          <div class="login-divider"></div>
          <div>
            <div class="login-headline" style="${f.css}font-size:20px;">Bem-vindo de volta!</div>
            <div class="login-sub">Seu próximo trabalho está esperando você.</div>
          </div>
          <button class="login-btn" style="${f.css}font-size:14px;">Entrar →</button>
        </div>
      `;
    }

    lista.appendChild(el);
  });

  // Aplicar animación después de insertar
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-splash, .card-login').forEach((c, i) => {
      c.style.animation = `cardIn 0.35s ${i * 0.05}s ease both`;
    });
  });
}

render();
</script>

</body>
</html>
