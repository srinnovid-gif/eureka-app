<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Eureka! — Tipografias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Familia Asap completa + similares de Omnibus-Type y otras grotescas humanistas con itálica fuerte -->
<link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Asap:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Cabin+Condensed:wght@700&family=Cabin:ital,wght@0,700;1,700&family=Chivo:ital,wght@0,700;0,900;1,700;1,900&family=Archivo+Narrow:ital,wght@0,700;1,700&family=Archivo:ital,wght@0,700;0,900;1,700;1,900&family=Faustina:ital,wght@0,700;0,800;1,700;1,800&family=Barlow:ital,wght@0,700;0,900;1,700;1,900&family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=Barlow+Semi+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=IBM+Plex+Sans+Condensed:ital,wght@0,700;1,700&family=IBM+Plex+Sans:ital,wght@0,700;1,700&family=Nunito:wght@900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FF4D20;
  --ink: #111010; --ink2: #6B6560; --ink3: #B8B0A8;
  --border: #F0EDE8; --white: #FFFFFF; --pale: #FFF5EE;
}
html, body {
  min-height: 100%; background: #0E0E0E;
  color: white; font-family: 'Nunito', sans-serif;
}

/* TOP BAR */
.top {
  position: sticky; top: 0; z-index: 100;
  background: #0a0a0a; border-bottom: 1px solid #1f1f1f;
  padding: 14px 16px 10px;
}
.top-logo {
  font-family: 'Asap Condensed', sans-serif;
  font-weight: 900; font-style: italic;
  font-size: 22px; color: var(--orange); margin-bottom: 3px;
}
.top-sub { font-size: 10px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.toggle { display: flex; gap: 5px; background: #1a1a1a; padding: 4px; border-radius: 12px; }
.tbtn {
  flex: 1; padding: 9px 6px; border: none; border-radius: 9px;
  font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
}
.tbtn.on { background: var(--orange); color: white; }
.tbtn:not(.on) { background: transparent; color: var(--ink3); }

/* LISTA */
.lista { padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 10px; }

/* SPLASH */
.cs { border-radius: 18px; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
.cs:active { transform: scale(0.975); }
.cs-inner {
  padding: 22px 22px 20px; position: relative; overflow: hidden;
  min-height: 200px; display: flex; flex-direction: column; justify-content: space-between;
}
.cs-inner::before {
  content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%;
  top: -60px; right: -60px; background: rgba(255,255,255,0.05); pointer-events: none;
}
.cs-top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 2; margin-bottom: 10px; }
.cs-num {
  width: 24px; height: 24px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  border-radius: 50%; font-size: 10px; font-weight: 800; color: white;
  display: flex; align-items: center; justify-content: center;
}
.cs-tag {
  font-size: 9px; padding: 4px 9px; border-radius: 50px;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.85); font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.cs-logo { position: relative; z-index: 2; line-height: 1; display: block; margin-bottom: 14px; }
.cs-preview { position: relative; z-index: 2; }
.cs-h { font-size: 15px; line-height: 1.2; opacity: 0.8; margin-bottom: 3px; }
.cs-s { font-size: 10.5px; opacity: 0.45; line-height: 1.4; }

/* REFERENCIA badge */
.ref-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 9px; padding: 3px 8px; border-radius: 50px;
  background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  margin-bottom: 8px; width: fit-content; position: relative; z-index: 2;
}

/* LOGIN */
.cl { border-radius: 18px; overflow: hidden; background: white; cursor: pointer; transition: transform 0.15s; }
.cl:active { transform: scale(0.975); }
.cl-inner { padding: 18px 20px 18px; display: flex; flex-direction: column; gap: 11px; }
.cl-meta { display: flex; align-items: center; gap: 8px; padding-bottom: 11px; border-bottom: 1px solid var(--border); }
.cl-num {
  width: 22px; height: 22px; background: var(--orange); color: white;
  border-radius: 50%; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.cl-fname { font-family: monospace; font-size: 10px; color: var(--ink3); flex: 1; }
.cl-tag { font-size: 9px; padding: 3px 8px; border-radius: 50px; background: var(--pale); color: var(--orange); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.cl-ref { font-size: 9px; color: var(--ink3); font-family: monospace; padding: 2px 0; }
.cl-logo { line-height: 1; display: block; }
.cl-div { height: 1px; background: var(--border); }
.cl-h { font-size: 19px; color: var(--ink); line-height: 1.2; }
.cl-s { font-size: 13px; color: var(--ink2); line-height: 1.5; margin-top: -4px; }
.cl-btn {
  width: 100%; padding: 13px; border-radius: 14px;
  background: var(--orange); color: white; border: none;
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 6px; cursor: default;
}

@keyframes cardIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="top">
  <div class="top-logo">Eureka! · Similares #3 e #4</div>
  <div class="top-sub">Grotescas humanistas · Itálica · Semi-quadradas</div>
  <div class="toggle">
    <button class="tbtn on" id="bs" onclick="modo('s')">🌟 Splash</button>
    <button class="tbtn" id="bl" onclick="modo('l')">📱 Login</button>
  </div>
</div>

<div class="lista" id="lista"></div>

<script>
// As fontes #3 e #4 que você gostou:
// #3 = Asap Condensed 900 Italic
// #4 = Asap (semi-condensed) 900 Italic
//
// O que as define:
// ✓ Grotesca humanista (não pura geométrica)
// ✓ Itálica com inclinação marcada
// ✓ Pontas semi-quadradas com leve suavidade
// ✓ Peso 900 — muito bold sem ser agressivo
// ✓ "k" e "E" com formas distintas
//
// Família de referência: Omnibus-Type (criadores do Asap)
// Outras: humanistas condensadas com itálica forte

const F = [
  // ── FAMÍLIA ASAP — TODOS OS MEMBROS ──
  {
    n:1, nome:"Asap Condensed 900 Italic",
    tag:"Original #3",
    ref:"Sua escolha original",
    css:`font-family:'Asap Condensed',sans-serif;font-weight:900;font-style:italic;`,
    sz:"78px",
    bg:"linear-gradient(145deg,#004D40,#00695C)",
    cor:"white", lcor:"#004D40",
    why:"A fonte que você escolheu. Condensada, itálica marcada, pontas com leve suavidade. O 'k' e o 'E' são únicos."
  },
  {
    n:2, nome:"Asap 900 Italic",
    tag:"Original #4",
    ref:"Sua escolha original",
    css:`font-family:'Asap',sans-serif;font-weight:900;font-style:italic;`,
    sz:"66px",
    bg:"linear-gradient(145deg,#4A148C,#6A1B9A)",
    cor:"white", lcor:"#4A148C",
    why:"Versão mais larga. Mais presença no login, mais legível em tamanhos pequenos. Mesma personalidade."
  },
  {
    n:3, nome:"Asap Condensed 800 Italic",
    tag:"Asap mais leve",
    ref:"Variação Asap",
    css:`font-family:'Asap Condensed',sans-serif;font-weight:800;font-style:italic;`,
    sz:"78px",
    bg:"linear-gradient(145deg,#1A237E,#283593)",
    cor:"white", lcor:"#1A237E",
    why:"Mesmo DNA do #3, mas 800 é um pouco mais fino. Às vezes parece mais elegante — menos agressivo, mais sofisticado."
  },
  {
    n:4, nome:"Asap 800 Italic",
    tag:"Asap equilibrada",
    ref:"Variação Asap",
    css:`font-family:'Asap',sans-serif;font-weight:800;font-style:italic;`,
    sz:"66px",
    bg:"linear-gradient(145deg,#BF360C,#E64A19)",
    cor:"white", lcor:"#BF360C",
    why:"Semi-condensada 800 — o ponto de equilíbrio. Nem muito pesado nem muito leve. Muito boa no login em tamanho médio."
  },

  // ── BARLOW FAMILY — DNA PARECIDO COM ASAP ──
  // Barlow é California grotesque, Asap é argentina — mesmo espírito humanista
  {
    n:5, nome:"Barlow Semi Condensed 900 Italic",
    tag:"Barlow semi-cond",
    ref:"Mesmo espírito que Asap",
    css:`font-family:'Barlow Semi Condensed',sans-serif;font-weight:900;font-style:italic;`,
    sz:"70px",
    bg:"linear-gradient(145deg,#0D1117,#21262D)",
    cor:"var(--orange)", lcor:"var(--orange)",
    why:"Barlow Semi Condensed 900i — quase idêntica à proporção do Asap #4. Mesmas terminações semi-quadradas, mesma inclinação dinâmica. Pouco mais geométrica."
  },
  {
    n:6, nome:"Barlow Condensed 900 Italic",
    tag:"Barlow condensada",
    ref:"Mais condensada que Asap",
    css:`font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;`,
    sz:"82px",
    bg:"linear-gradient(145deg,#880E4F,#AD1457)",
    cor:"white", lcor:"#880E4F",
    why:"Mais condensada que o Asap #3. DNA californiano — grotesca com terminações mais planas. O 'k' em itálica tem um ângulo diferente do Asap, mais abrupto."
  },
  {
    n:7, nome:"Barlow 900 Italic",
    tag:"Barlow largo",
    ref:"Barlow sem condensar",
    css:`font-family:'Barlow',sans-serif;font-weight:900;font-style:italic;`,
    sz:"60px",
    bg:"linear-gradient(145deg,#006064,#00838F)",
    cor:"white", lcor:"#006064",
    why:"Barlow regular 900i — mais amplo, mais presença horizontal. Bom para logos que precisam ocupar espaço. Pontas semi-quadradas menos visíveis que nas versões condensadas."
  },

  // ── CHIVO — Omnibus-Type, mesmos criadores do Asap ──
  {
    n:8, nome:"Chivo 900 Italic",
    tag:"Irmã do Asap",
    ref:"Mesmo criador — Omnibus-Type",
    css:`font-family:'Chivo',sans-serif;font-weight:900;font-style:italic;`,
    sz:"64px",
    bg:"linear-gradient(145deg,#212121,#424242)",
    cor:"var(--orange)", lcor:"#212121",
    why:"Chivo: criada pelo mesmo estúdio do Asap (Omnibus-Type). DNA idêntico mas com proportions ligeiramente diferentes. O 'h' e 'u' têm aberturas maiores — parece mais arejada."
  },
  {
    n:9, nome:"Chivo 700 Italic",
    tag:"Chivo mais leve",
    ref:"Mesmo criador — Omnibus-Type",
    css:`font-family:'Chivo',sans-serif;font-weight:700;font-style:italic;`,
    sz:"64px",
    bg:"linear-gradient(145deg,#1B4332,#2D6A4F)",
    cor:"white", lcor:"#1B4332",
    why:"Chivo 700i — mais fina, parece mais elegante. Para marcas que querem parecer tech-cool sem ser agressivas. O '!' fica muito bem nesta espessura."
  },

  // ── ARCHIVO — grotesca humanista, itálica forte ──
  {
    n:10, nome:"Archivo 900 Italic",
    tag:"Archivo bold italic",
    ref:"Grotesca humanista argentina",
    css:`font-family:'Archivo',sans-serif;font-weight:900;font-style:italic;`,
    sz:"64px",
    bg:"linear-gradient(145deg,#0F3460,#1B5E8A)",
    cor:"white", lcor:"#0F3460",
    why:"Archivo: grotesca argentina desenhada para legibilidade máxima em telas. Itálica 900 muito expressiva. Pontas semi-quadradas com leve tensão. O 'r' e 'a' têm caráter."
  },
  {
    n:11, nome:"Archivo Narrow 700 Italic",
    tag:"Archivo condensada",
    ref:"Versão narrow do Archivo",
    css:`font-family:'Archivo Narrow',sans-serif;font-weight:700;font-style:italic;`,
    sz:"78px",
    bg:"linear-gradient(145deg,#7B2D00,#BF360C)",
    cor:"white", lcor:"#BF360C",
    why:"Arquivo Narrow 700i — muito condensada com inclinação forte. Sem peso 900 disponível, mas o 700 já é bastante bold. Similar ao Asap Condensed mas com aberturas diferentes."
  },

  // ── CABIN — humanista próxima ao Johnston ──
  {
    n:12, nome:"Cabin Condensed 700 Italic",
    tag:"Humanista clássica",
    ref:"DNA humanista puro",
    css:`font-family:'Cabin',sans-serif;font-weight:700;font-style:italic;`,
    sz:"72px",
    bg:"linear-gradient(145deg,#4A0E8F,#7B1FA2)",
    cor:"white", lcor:"#4A0E8F",
    why:"Cabin: humanista inspirada no Johnston (fonte do metrô de Londres). Itálica 700 tem muita personalidade. Não é 900 mas compensa com proporções mais largas e abertas."
  },

  // ── IBM PLEX SANS — terminações com corte diagonal único ──
  {
    n:13, nome:"IBM Plex Sans Condensed 700 Italic",
    tag:"Terminações únicas",
    ref:"Corte diagonal semi-quadrado",
    css:`font-family:'IBM Plex Sans Condensed',sans-serif;font-weight:700;font-style:italic;`,
    sz:"74px",
    bg:"linear-gradient(145deg,#002D62,#0043A4)",
    cor:"white", lcor:"#002D62",
    why:"IBM Plex tem terminações com corte diagonal único — nem redondo nem horizontal. O resultado é semi-quadrado com um toque técnico. Itálica condensada muito bem construída."
  },
  {
    n:14, nome:"IBM Plex Sans 700 Italic",
    tag:"IBM Plex semi-cond",
    ref:"Versão larga com o mesmo DNA",
    css:`font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-style:italic;`,
    sz:"60px",
    bg:"linear-gradient(145deg,#1C1C1C,#2D2D2D)",
    cor:"var(--orange)", lcor:"#1C1C1C",
    why:"IBM Plex Sans 700i regular — as terminações diagonais ficam mais visíveis em tamanho maior. Sobre escuro com laranja parece muito premium e tech."
  },
];

let m = 's';

function modo(v) {
  m = v;
  document.getElementById('bs').className = 'tbtn' + (v==='s'?' on':'');
  document.getElementById('bl').className = 'tbtn' + (v==='l'?' on':'');
  render();
}

function render() {
  const lista = document.getElementById('lista');
  lista.innerHTML = '';
  F.forEach((f, i) => {
    const el = document.createElement('div');
    if (m === 's') {
      el.className = 'cs';
      // Marcar las originales
      const isOrig = f.ref && f.ref.includes('original');
      el.innerHTML = `
        <div class="cs-inner" style="background:${f.bg}">
          <div class="cs-top">
            <div class="cs-num">${f.n}</div>
            <div class="cs-tag">${f.tag}</div>
          </div>
          ${isOrig ? `<div class="ref-badge">⭐ ${f.ref}</div>` : `<div class="ref-badge">↗ ${f.ref}</div>`}
          <div class="cs-logo" style="${f.css}font-size:${f.sz};color:${f.cor};">Eureka!</div>
          <div class="cs-preview">
            <div class="cs-h" style="${f.css}font-size:16px;color:${f.cor};">Seu trabalho está aqui</div>
            <div class="cs-s">${f.why}</div>
          </div>
        </div>`;
    } else {
      el.className = 'cl';
      const sz2 = Math.round(parseInt(f.sz)*0.62)+'px';
      el.innerHTML = `
        <div class="cl-inner">
          <div class="cl-meta">
            <div class="cl-num">${f.n}</div>
            <span class="cl-fname">${f.nome}</span>
            <span class="cl-tag">${f.tag}</span>
          </div>
          <div class="cl-ref">↗ ${f.ref}</div>
          <div class="cl-logo" style="${f.css}font-size:${sz2};color:${f.lcor};">Eureka!</div>
          <div class="cl-div"></div>
          <div>
            <div class="cl-h" style="${f.css}font-size:20px;">Bem-vindo de volta!</div>
            <div class="cl-s">Seu próximo trabalho está esperando você.</div>
          </div>
          <button class="cl-btn" style="${f.css}font-size:14px;">Entrar →</button>
        </div>`;
    }
    el.style.animation = `cardIn 0.35s ${i*0.04}s ease both`;
    el.style.opacity = '0';
    lista.appendChild(el);
  });
}

render();
</script>
</body>
</html>
