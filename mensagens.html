<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#16232A"/>
  <title>Eureka! — Mensagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,800;1,800&family=Geologica:slnt,wght@-12..0,100..900&family=Glory:ital,wght@0,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #FF4D20; --green: #0F8A6F;
      --ink: #16232A; --ink2: #C8D2D6; --ink3: #6E7E85;
      --border: #25333B; --white: #FAF7F2; --surface: #1C2A32; --bg-app: #0E1418;
    }
    * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: 'Geologica', sans-serif; background: var(--bg-app); color: var(--white); -webkit-font-smoothing: antialiased; }

    #app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg-app); overflow: hidden; }

    .header { flex-shrink: 0; padding: 20px 18px 14px; }
    .header-titulo { font-family: 'Glory', sans-serif; font-weight: 800; font-size: 26px; }

    .abas-wrap { flex-shrink: 0; padding: 0 16px 12px; }
    .abas { display: flex; gap: 6px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 50px; padding: 4px; }
    .aba { flex: 1; text-align: center; padding: 9px 0; border-radius: 50px; font-size: 12.5px; font-weight: 700; color: var(--ink2); cursor: pointer; }
    .aba.ativo { background: var(--orange); color: white; }

    .lista-area { flex: 1; overflow-y: auto; padding: 0 12px 16px; }

    .conversa-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 16px;
      cursor: pointer; transition: background 0.15s;
    }
    .conversa-item:active { background: var(--surface); }

    .conv-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #FF8A5C, var(--orange));
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-weight: 700; font-size: 17px; color: white;
      overflow: hidden; position: relative;
    }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--bg-app);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-nome-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .conv-nome { font-size: 14.5px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-hora { font-size: 11px; color: var(--ink3); flex-shrink: 0; }
    .conv-hora.nao-lida { color: var(--orange); font-weight: 700; }

    .conv-msg-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 3px; }
    .conv-msg { font-size: 13px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .conv-msg.nao-lida { color: var(--ink2); font-weight: 600; }

    .conv-badge {
      flex-shrink: 0; min-width: 19px; height: 19px; border-radius: 50px;
      background: var(--orange); color: white;
      font-size: 10.5px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }

    .conv-contexto {
      font-size: 10.5px; color: #5FD9B8; font-weight: 700;
      margin-top: 4px; display: flex; align-items: center; gap: 4px;
    }
    .conv-contexto svg { width: 11px; height: 11px; }

    .vazio { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; padding: 60px 24px; color: var(--ink3); font-size: 14px; }
    .vazio.show { display: flex; }
    .vazio-icone { font-size: 36px; }

    .bottom-nav { flex-shrink: 0; display: flex; align-items: center; justify-content: space-around; padding: 0 8px calc(14px + env(safe-area-inset-bottom, 0px)); background: var(--bg-app); border-top: 1px solid var(--border); }
    .nv-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--ink3); cursor: pointer; flex: 1; padding: 10px 0; }
    .nv-item svg { width: 26px; height: 26px; }
    .nv-item.on { color: var(--orange); }
    .nv-central-icone { width: 34px; height: 34px; border-radius: 11px; display: flex; align-items: center; justify-content: center; }
    .nv-central-icone svg { width: 24px; height: 24px; }
    .nv-avt { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
    .nv-avt svg { width: 26px; height: 26px; }
    .nv-item.on .nv-avt { color: var(--orange); }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-titulo">Mensagens</div>
  </div>

  <div class="abas-wrap">
    <div class="abas">
      <div class="aba ativo" data-aba="todas" onclick="trocarAba('todas')">Todas</div>
      <div class="aba" data-aba="nao-lidas" onclick="trocarAba('nao-lidas')">Não lidas</div>
    </div>
  </div>

  <div class="lista-area" id="lista-area"></div>

  <div class="vazio" id="vazio">
    <div class="vazio-icone">💬</div>
    <span>Nenhuma mensagem por aqui ainda.</span>
  </div>

  <div class="bottom-nav">
    <div class="nv-item" onclick="location.href='inicio.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 2l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z"/></svg>
    </div>
    <div class="nv-item nv-item-central" onclick="location.href='home.html'">
      <div class="nv-central-icone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
    </div>
    <div class="nv-item" onclick="location.href='buscar.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="nv-item on" onclick="location.href='mensagens.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    <div class="nv-item" onclick="location.href='perfil.html'">
      <div class="nv-avt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.5 3.5-7 8-7s8 2.5 8 7"/></svg>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// DADOS DE EXEMPLO
// ══════════════════════════════════════
const CONVERSAS = [
  { id:1, nome:'Restaurante Sabor Caseiro', online:true,  ultimaMsg:'Perfeito! Te espero amanhã às 18h então.', hora:'14:32', naoLidas:2, contexto:'Garçom para evento de fim de semana' },
  { id:2, nome:'João Ricardo', fotoPerfil:'https://i.pravatar.cc/100?img=33', online:false, ultimaMsg:'Posso te atender sábado de manhã, pode ser?', hora:'11:05', naoLidas:0, contexto:'Barbearia a domicílio' },
  { id:3, nome:'TechNova Soluções', fotoPerfil:'https://i.pravatar.cc/100?img=12', online:true, ultimaMsg:'Você: Enviei meu portfólio, qualquer dúvida me avisa!', hora:'Ontem', naoLidas:0, contexto:'Designer gráfico para redes sociais' },
  { id:4, nome:'Mudanças Rápidas Curitiba', online:false, ultimaMsg:'Combinado, nos vemos quinta-feira às 8h.', hora:'Ontem', naoLidas:0, contexto:null },
  { id:5, nome:'Carla Mendes', online:true,  ultimaMsg:'Posso te mandar um vídeo de uma aula para você ver o estilo?', hora:'Seg', naoLidas:1, contexto:'Aulas de música' },
  { id:6, nome:'Construtora Pinheiro', online:false, ultimaMsg:'Vamos fechar o orçamento essa semana ainda.', hora:'22/06', naoLidas:0, contexto:null },
];

let abaAtual = 'todas';

function trocarAba(aba) {
  abaAtual = aba;
  document.querySelectorAll('.aba').forEach(a => a.classList.toggle('ativo', a.dataset.aba === aba));
  renderLista();
}

function renderLista() {
  const area = document.getElementById('lista-area');
  area.innerHTML = '';

  let lista = CONVERSAS;
  if (abaAtual === 'nao-lidas') lista = lista.filter(c => c.naoLidas > 0);

  document.getElementById('vazio').classList.toggle('show', lista.length === 0);

  lista.forEach(c => {
    const el = document.createElement('div');
    el.className = 'conversa-item';

    const temNaoLida = c.naoLidas > 0;

    el.innerHTML = `
      <div class="conv-avatar">
        ${c.fotoPerfil ? `<img src="${c.fotoPerfil}" alt="${c.nome}">` : c.nome.charAt(0)}
        ${c.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-nome-row">
          <div class="conv-nome">${c.nome}</div>
          <div class="conv-hora ${temNaoLida ? 'nao-lida' : ''}">${c.hora}</div>
        </div>
        <div class="conv-msg-row">
          <div class="conv-msg ${temNaoLida ? 'nao-lida' : ''}">${c.ultimaMsg}</div>
          ${temNaoLida ? `<div class="conv-badge">${c.naoLidas}</div>` : ''}
        </div>
        ${c.contexto ? `<div class="conv-contexto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>${c.contexto}</div>` : ''}
      </div>
    `;

    el.onclick = () => {
      location.href = `chat.html?id=${c.id}`;
    };

    area.appendChild(el);
  });
}

renderLista();
</script>
</body>
</html>
