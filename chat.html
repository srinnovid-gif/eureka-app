<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#16232A"/>
  <title>Eureka! — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,800;1,800&family=Geologica:slnt,wght@-12..0,100..900&family=Glory:ital,wght@0,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #FF4D20; --green: #0F8A6F;
      --ink: #16232A; --ink2: #C8D2D6; --ink3: #6E7E85;
      --border: #25333B; --white: #FAF7F2; --surface: #1C2A32; --bg-app: #0E1418;
    }
    * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: 'Geologica', sans-serif; background: var(--bg-app); color: var(--white); -webkit-font-smoothing: antialiased; }

    #app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg-app); overflow: hidden; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header {
      flex-shrink: 0; display: flex; align-items: center; gap: 11px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .btn-voltar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; color: var(--white);
    }
    .btn-voltar svg { width: 16px; height: 16px; }

    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #FF8A5C, var(--orange));
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-weight: 700; font-size: 14px; color: white;
      overflow: hidden; position: relative;
    }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header-online {
      position: absolute; bottom: 0; right: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--bg-app);
    }

    .header-info { flex: 1; min-width: 0; }
    .header-nome { font-size: 14.5px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 11.5px; color: var(--ink3); margin-top: 1px; }
    .header-status.online { color: #5FD9B8; }

    /* ══════════════════════════════════════
       CONTEXTO (vaga vinculada)
    ══════════════════════════════════════ */
    .contexto-bar {
      flex-shrink: 0; display: none; align-items: center; gap: 8px;
      padding: 10px 16px; background: rgba(255,77,32,0.08);
      border-bottom: 1px solid var(--border);
      font-size: 12px; color: #FF8A5C; font-weight: 700;
    }
    .contexto-bar.show { display: flex; }
    .contexto-bar svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ══════════════════════════════════════
       MENSAGENS
    ══════════════════════════════════════ */
    .mensagens-area {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .msg-data {
      text-align: center; font-size: 11px; color: var(--ink3);
      margin: 10px 0 6px; font-weight: 600;
    }

    .msg-row { display: flex; }
    .msg-row.enviada { justify-content: flex-end; }
    .msg-row.recebida { justify-content: flex-start; }

    .msg-bolha {
      max-width: 78%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.4; margin-bottom: 8px;
      position: relative;
    }
    .msg-row.enviada .msg-bolha {
      background: var(--orange); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.recebida .msg-bolha {
      background: var(--surface); color: var(--white); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-hora {
      font-size: 10px; margin-top: 3px; display: block;
    }
    .msg-row.enviada .msg-hora { color: rgba(255,255,255,0.7); text-align: right; }
    .msg-row.recebida .msg-hora { color: var(--ink3); }

    /* ══════════════════════════════════════
       INPUT
    ══════════════════════════════════════ */
    .input-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border);
      background: var(--bg-app);
    }

    .input-campo {
      flex: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 24px; padding: 11px 16px;
      font-family: 'Geologica', sans-serif; font-size: 14.5px; color: var(--white);
      outline: none; transition: border-color 0.2s;
      max-height: 100px;
    }
    .input-campo:focus { border-color: var(--orange); }
    .input-campo::placeholder { color: var(--ink3); }

    .btn-enviar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: var(--orange); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 12px rgba(255,77,32,0.35);
      transition: transform 0.1s;
    }
    .btn-enviar:active { transform: scale(0.92); }
    .btn-enviar svg { width: 19px; height: 19px; }
    .btn-enviar:disabled { opacity: 0.4; box-shadow: none; }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <button class="btn-voltar" onclick="location.href='mensagens.html'" aria-label="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    </button>
    <div class="header-avatar" id="header-avatar"></div>
    <div class="header-info">
      <div class="header-nome" id="header-nome"></div>
      <div class="header-status" id="header-status"></div>
    </div>
  </div>

  <div class="contexto-bar" id="contexto-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span id="contexto-texto"></span>
  </div>

  <div class="mensagens-area" id="mensagens-area"></div>

  <div class="input-bar">
    <input type="text" id="input-msg" class="input-campo" placeholder="Escreva uma mensagem..." oninput="atualizarBotaoEnviar()" onkeydown="if(event.key==='Enter'){enviarMensagem()}"/>
    <button class="btn-enviar" id="btn-enviar" onclick="enviarMensagem()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
// ══════════════════════════════════════
// DADOS DE EXEMPLO — mesmas conversas de mensagens.html
// ══════════════════════════════════════
const CONVERSAS = {
  1: { nome:'Restaurante Sabor Caseiro', online:true, contexto:'Garçom para evento de fim de semana',
    mensagens: [
      { de:'eles', texto:'Oi! Vi que você se candidatou para a vaga de garçom, ainda tem interesse?', hora:'13:50' },
      { de:'eu',   texto:'Oi! Sim, tenho bastante interesse. Pode me passar mais detalhes do evento?', hora:'14:02' },
      { de:'eles', texto:'É um evento corporativo no sábado à noite, das 18h às 23h. Precisamos de alguém com experiência.', hora:'14:15' },
      { de:'eu',   texto:'Já trabalhei em vários eventos parecidos, tenho 3 anos de experiência na área.', hora:'14:20' },
      { de:'eles', texto:'Perfeito! Te espero amanhã às 18h então.', hora:'14:32' },
    ]
  },
  2: { nome:'João Ricardo', fotoPerfil:'https://i.pravatar.cc/100?img=33', online:false, contexto:'Barbearia a domicílio',
    mensagens: [
      { de:'eu', texto:'Olá João! Vi seu perfil na Eureka, gostaria de agendar um corte.', hora:'10:40' },
      { de:'eles', texto:'Oi! Claro, qual seria o melhor dia pra você?', hora:'10:55' },
      { de:'eu', texto:'Pode ser sábado de manhã?', hora:'11:00' },
      { de:'eles', texto:'Posso te atender sábado de manhã, pode ser?', hora:'11:05' },
    ]
  },
  3: { nome:'TechNova Soluções', fotoPerfil:'https://i.pravatar.cc/100?img=12', online:true, contexto:'Designer gráfico para redes sociais',
    mensagens: [
      { de:'eles', texto:'Olá! Gostamos muito do seu perfil, você tem portfólio disponível?', hora:'Ontem 09:10' },
      { de:'eu', texto:'Enviei meu portfólio, qualquer dúvida me avisa!', hora:'Ontem 09:45' },
    ]
  },
  4: { nome:'Mudanças Rápidas Curitiba', online:false, contexto:null,
    mensagens: [
      { de:'eles', texto:'Precisamos de um ajudante para quinta-feira de manhã, você teria disponibilidade?', hora:'Ontem 16:00' },
      { de:'eu', texto:'Sim, tenho disponibilidade! Que horas seria?', hora:'Ontem 16:10' },
      { de:'eles', texto:'Combinado, nos vemos quinta-feira às 8h.', hora:'Ontem 16:20' },
    ]
  },
  5: { nome:'Carla Mendes', online:true, contexto:'Aulas de música',
    mensagens: [
      { de:'eu', texto:'Oi Carla! Gostaria de saber mais sobre as aulas de violão.', hora:'Seg 18:00' },
      { de:'eles', texto:'Oi! Posso te mandar um vídeo de uma aula para você ver o estilo?', hora:'Seg 18:15' },
    ]
  },
  6: { nome:'Construtora Pinheiro', online:false, contexto:null,
    mensagens: [
      { de:'eles', texto:'Vamos fechar o orçamento essa semana ainda.', hora:'22/06 11:00' },
    ]
  },
};

const params = new URLSearchParams(location.search);
const convId = params.get('id') || '1';
const conversa = CONVERSAS[convId] || CONVERSAS[1];

document.getElementById('header-avatar').innerHTML = `
  ${conversa.fotoPerfil ? `<img src="${conversa.fotoPerfil}" alt="${conversa.nome}">` : conversa.nome.charAt(0)}
  ${conversa.online ? '<div class="header-online"></div>' : ''}
`;
document.getElementById('header-nome').textContent = conversa.nome;
document.getElementById('header-status').textContent = conversa.online ? 'Online agora' : 'Offline';
document.getElementById('header-status').classList.toggle('online', conversa.online);

if (conversa.contexto) {
  document.getElementById('contexto-bar').classList.add('show');
  document.getElementById('contexto-texto').textContent = conversa.contexto;
}

const area = document.getElementById('mensagens-area');

function renderMensagens() {
  area.innerHTML = '';
  let ultimaData = null;

  conversa.mensagens.forEach(m => {
    const dataLabel = m.hora.includes(' ') ? m.hora.split(' ')[0] : 'Hoje';
    if (dataLabel !== ultimaData) {
      const dataEl = document.createElement('div');
      dataEl.className = 'msg-data';
      dataEl.textContent = dataLabel;
      area.appendChild(dataEl);
      ultimaData = dataLabel;
    }

    const row = document.createElement('div');
    row.className = `msg-row ${m.de === 'eu' ? 'enviada' : 'recebida'}`;
    const horaExibida = m.hora.includes(' ') ? m.hora.split(' ')[1] : m.hora;
    row.innerHTML = `
      <div class="msg-bolha">
        ${m.texto}
        <span class="msg-hora">${horaExibida}</span>
      </div>
    `;
    area.appendChild(row);
  });

  area.scrollTop = area.scrollHeight;
}

renderMensagens();

// ══════════════════════════════════════
// ENVIAR MENSAGEM
// ══════════════════════════════════════
function atualizarBotaoEnviar() {
  const valor = document.getElementById('input-msg').value.trim();
  document.getElementById('btn-enviar').disabled = valor.length === 0;
}

function enviarMensagem() {
  const input = document.getElementById('input-msg');
  const texto = input.value.trim();
  if (!texto) return;

  const agora = new Date();
  const hora = `${String(agora.getHours()).padStart(2,'0')}:${String(agora.getMinutes()).padStart(2,'0')}`;

  conversa.mensagens.push({ de: 'eu', texto, hora: `Hoje ${hora}` });
  renderMensagens();

  input.value = '';
  atualizarBotaoEnviar();
}
</script>
</body>
</html>
